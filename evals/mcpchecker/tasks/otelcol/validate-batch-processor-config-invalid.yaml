kind: Task
apiVersion: mcpchecker/v1alpha2
metadata:
  name: "validate-batch-processor-config-invalid"
  difficulty: easy
  parallel: true
  runs: 1
  labels:
    category: otelcol
    toolType: validation
  description: |
    Tests if the agent can detect an invalid batch processor configuration.
spec:
  verify:
    - llmJudge:
        contains: "Additional property does_not_exist is not allowed"
        reason: "Verify the response indicates invalid configuration"
  prompt:
    inline: |
      Validate this OpenTelemetry Collector batch processor configuration:

      ```yaml
      does_not_exist: 200ms
      send_batch_size: 8192
      send_batch_max_size: 0
      ```

      Is this configuration valid?
