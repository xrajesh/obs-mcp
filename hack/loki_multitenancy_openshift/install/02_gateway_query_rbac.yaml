# Optional RBAC for querying NetObserv flow logs through the LokiStack gateway.
#
# The openshift-network gateway enforces OpenShift authorization: your token must
# be allowed to access namespaces referenced in LogQL (e.g. SrcK8S_Namespace).
#
# Bind to your user (local obs-mcp with --auth-mode kubeconfig):
#   oc create clusterrolebinding "obs-mcp-loki-gateway-read-$(oc whoami | tr '@:' '-')" \
#     --clusterrole=obs-mcp-loki-gateway-read \
#     --user="$(oc whoami)"
#
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: obs-mcp-loki-gateway-read
rules:
  - apiGroups: [""]
    resources: ["namespaces", "pods"]
    verbs: ["get", "list", "watch"]
