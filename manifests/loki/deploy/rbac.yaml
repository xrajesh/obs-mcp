apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: obs-mcp-lokistack-discovery
  namespace: obs-mcp-loki
rules:
  - apiGroups: ["loki.grafana.com"]
    resources: ["lokistacks"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["route.openshift.io"]
    resources: ["routes"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: obs-mcp-lokistack-discovery
  namespace: obs-mcp-loki
subjects:
  - kind: ServiceAccount
    name: obs-mcp
    namespace: obs-mcp
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: obs-mcp-lokistack-discovery
