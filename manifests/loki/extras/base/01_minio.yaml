apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  labels:
    app.kubernetes.io/name: minio
  name: minio
  namespace: obs-mcp-loki
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: obs-mcp-loki
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: minio
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: minio
    spec:
      containers:
        - command:
            - /bin/sh
            - -c
            - |
              mkdir -p /storage/loki-chunks /storage/loki-ruler /storage/loki-admin && \
              minio server /storage
          env:
            - name: MINIO_ACCESS_KEY
              value: loki
            - name: MINIO_SECRET_KEY
              value: supersecret
          # Pinned for reproducible hack deployments (MinIO RELEASE.2024-12-13 security fix).
          image: docker.io/minio/minio:RELEASE.2024-12-13T22-19-12Z
          name: minio
          ports:
            - containerPort: 9000
          volumeMounts:
            - mountPath: /storage
              name: storage
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: minio
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: obs-mcp-loki
spec:
  ports:
    - port: 9000
      protocol: TCP
      targetPort: 9000
  selector:
    app.kubernetes.io/name: minio
  type: ClusterIP
---
apiVersion: v1
kind: Secret
metadata:
  name: loki-storage
  namespace: obs-mcp-loki
stringData:
  endpoint: http://minio:9000
  bucketnames: loki-chunks,loki-ruler,loki-admin
  access_key_id: loki
  access_key_secret: supersecret
  region: us-east-1
type: Opaque
